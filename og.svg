<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- PHANTOM link-preview card (manifest-og). The ONE asset where text is allowed (it's a
       social card, not an icon): ghost left, Audiowide PHANTOM wordmark with the brand
       violet->cyan gradient right. Same ghost geometry + tokens as icon.svg. -->
  <defs>
    <radialGradient id="ogGlow" cx="24%" cy="48%" r="55%">
      <stop offset="0%"   stop-color="#b478ff" stop-opacity="0.26"/>
      <stop offset="55%"  stop-color="#6a3a9e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ghostStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b478ff"/>
      <stop offset="100%" stop-color="#9af6ff"/>
    </linearGradient>
    <linearGradient id="ghostFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#13091f"/>
      <stop offset="100%" stop-color="#04141a"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9af6ff" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#9af6ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9af6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#b478ff"/>
      <stop offset="100%" stop-color="#9af6ff"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="#020408"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#ogGlow)"/>

  <!-- ghost (left) -->
  <g transform="translate(38,48) scale(21)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"
          fill="none" stroke="url(#ghostStroke)" stroke-width="1.5" opacity="0.32"/>
    <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"
          fill="url(#ghostFill)" fill-opacity="0.72" stroke="url(#ghostStroke)" stroke-width="0.8"/>
    <ellipse cx="9.3"  cy="10.3" rx="2.3" ry="2.9" fill="url(#eyeGlow)"/>
    <ellipse cx="14.7" cy="10.3" rx="2.3" ry="2.9" fill="url(#eyeGlow)"/>
    <ellipse cx="9.3"  cy="10.3" rx="1.18" ry="1.85" fill="#ccfbff"/>
    <ellipse cx="14.7" cy="10.3" rx="1.18" ry="1.85" fill="#ccfbff"/>
    <ellipse cx="12" cy="13.5" rx="0.64" ry="1.02" fill="#9af6ff" fill-opacity="0.85"/>
  </g>

  <!-- wordmark (right) -->
  <text x="512" y="330" font-family="Audiowide" font-size="104" letter-spacing="3"
        fill="url(#wordmark)">PHANTOM</text>
  <text x="515" y="392" font-family="Consolas, monospace" font-size="26" letter-spacing="7"
        fill="#8AAFBF">FIELD INTELLIGENCE SYSTEM</text>
</svg>
