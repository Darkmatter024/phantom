<style>

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

  .brand{font-family:'Orbitron','Chakra Petch',sans-serif;font-size:13px;letter-spacing:.42em;
    color:#e8f2fa;text-shadow:0 0 18px rgba(40,224,255,.35)}

    letter-spacing:.34em;color:var(--dim);margin-top:5px}
  .stamp{font-size:9px;letter-spacing:.22em;color:var(--dim);text-align:right;line-height:1.7}
  .stamp b{color:var(--cyan);font-weight:600}
  .hud-bottom{bottom:0;padding:0 18px calc(env(safe-area-inset-bottom,0px) + 16px)}
  .herotag{display:inline-flex;align-items:center;gap:10px;pointer-events:none;
    background:rgba(8,14,22,.55);border:1px solid rgba(40,224,255,.22);border-radius:12px;
    padding:9px 14px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 0 24px rgba(40,224,255,.08), inset 0 1px 0 rgba(255,255,255,.05);
    transition:opacity .3s ease}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);
    box-shadow:0 0 10px var(--teal);animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.35}}
  .herotag .id{font-size:12px;letter-spacing:.2em;color:#e8f2fa;font-weight:600}
  .herotag .sub{font-size:9px;letter-spacing:.18em;color:var(--dim)}
  .dimrow{display:flex;align-items:center;gap:12px;margin-top:14px;pointer-events:auto}
  .dimrow label{font-size:9px;letter-spacing:.26em;color:var(--dim);white-space:nowrap}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:2px;
    background:linear-gradient(90deg,rgba(40,224,255,.5),rgba(138,75,255,.5));outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
    background:#0b1420;border:1.5px solid var(--cyan);box-shadow:0 0 12px rgba(40,224,255,.45)}
  .hint{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 92px);
    transform:translateX(-50%);font-size:9px;letter-spacing:.3em;color:var(--dim);
    z-index:9;pointer-events:none;transition:opacity .8s ease;white-space:nowrap}
  .hint.gone{opacity:0}
</style>

// ---------- fake Master: three real racks in the run (c1:001..003) ----------
function slotsGPU(prefix, n, extras){
  const s=[]; let u=48;
  const mk=(span,type,name,st)=>{s.push({uStart:u-span+1,uEnd:u,type,name,status:st}); u-=span;};
  mk(2,'switch',prefix+'-LEAF-A','racked');
  mk(2,'switch',prefix+'-LEAF-B','racked');
  mk(1,'patch','PP-48F-TOP','racked');
  for(let i=1;i<=n;i++) mk(4,'gpu','GPU-'+prefix+'-'+String(i).padStart(2,'0'),'racked');
  (extras||[]).forEach(e=>mk(e[0],e[1],e[2],e[3]));
  mk(1,'pdu','PDU-A/B','racked');
  return s;
}

// ---------- guts renderer ----------
function drawGuts(g, X0, Y0, GW, GH, slots){
  g.fillStyle='#060a10'; g.fillRect(X0,Y0,GW,GH);
  g.strokeStyle='rgba(40,224,255,0.14)'; g.lineWidth=2; g.strokeRect(X0+1,Y0+1,GW-2,GH-2);
  const uH=GH/48, toY=u=>Y0+(48-u)*uH;
  slots.forEach(sl=>{
    const y=toY(sl.uEnd), h=(sl.uEnd-sl.uStart+1)*uH-2;
    const col=TYPE_COLOR[sl.type]||'#22303e', racked=sl.status==='racked';
    g.fillStyle=racked?'rgba(14,22,32,0.95)':'rgba(10,14,20,0.55)';
    g.fillRect(X0+6,y,GW-12,h);
    g.globalAlpha=racked?0.9:0.45;
    g.fillStyle=racked?col:'rgba(90,107,125,0.35)';
    g.fillRect(X0+6,y,5,h);
    g.globalAlpha=1;
    g.fillStyle='rgba(60,80,100,0.3)'; g.fillRect(X0+6,y,GW-12,1);
    const fpx=Math.max(10,Math.min(15,h*0.34));
    g.font='600 '+fpx+'px "Chakra Petch",monospace';
    g.fillStyle=racked?'#c9d6e2':'rgba(90,107,125,0.7)';
    g.fillText(sl.name,X0+18,y+h/2+fpx*0.36);
    const dx=X0+GW-22, dy=y+h/2;
    g.beginPath(); g.arc(dx,dy,4.5,0,7);
    g.fillStyle=racked?'#1fffd0':'rgba(90,107,125,0.5)'; g.fill();
    if(racked){g.beginPath();g.arc(dx,dy,8,0,7);g.strokeStyle='rgba(31,255,208,0.35)';g.lineWidth=1.5;g.stroke();}
    if((sl.type==='gpu'||sl.type==='switch')&&racked&&h>26){
      g.fillStyle='rgba(40,224,255,0.8)';
      for(let p=0;p<8;p++) g.fillRect(X0+18+p*11,y+h-9,6,4);
    }
  });
}
function buildGutTexture(imgEl, slots){
  const W=imgEl.naturalWidth, H=imgEl.naturalHeight;
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const g=c.getContext('2d');
  g.drawImage(imgEl,0,0,W,H);
  drawGuts(g, W*GUT.x0, H*GUT.y0, W*(GUT.x1-GUT.x0), H*(GUT.y1-GUT.y0), slots);
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding;
  t.anisotropy=renderer.capabilities.getMaxAnisotropy();
  return t;
}

// ---------- name plate sprites (Code's aisle plates, our surface language) ----------
function plate(text, focus){
  const c=document.createElement('canvas'); c.width=256; c.height=64;
  const g=c.getContext('2d');
  g.fillStyle='rgba(8,14,22,0.85)'; g.fillRect(0,0,256,64);
  g.strokeStyle=focus?'rgba(40,224,255,0.7)':'rgba(60,80,100,0.5)';
  g.lineWidth=3; g.strokeRect(2,2,252,60);
  g.font='700 30px "Chakra Petch",monospace';
  g.fillStyle=focus?'#28e0ff':'#8fa6ba';
  g.textAlign='center'; g.fillText(text,128,42);
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding;
  const m=new THREE.MeshBasicMaterial({map:t,transparent:true});
  m.toneMapped=false;
  const p=new THREE.Mesh(new THREE.PlaneGeometry(1.5,0.375),m);
  return p;
}

// ---------- shared baked texture ----------
const bakedTex = new THREE.TextureLoader().load('data:image/webp;base64,'+FACE_B64);
bakedTex.encoding = THREE.sRGBEncoding;

const gunmetal=new THREE.MeshStandardMaterial({color:0x11161d,roughness:0.62,metalness:0.78});
const gunDark =new THREE.MeshStandardMaterial({color:0x0b0f14,roughness:0.7,metalness:0.7});

// ---------- rack builder ----------
// kind: 'dummy' (CW face) | 'run' (gut texture, focusable)
const focusables=[];
function buildRack(kind, label, x, z, opts){
  const grp=new THREE.Group(); grp.position.set(x,RH/2,z);
  const body=new THREE.Mesh(new THREE.BoxGeometry(RW,RH,RD),gunmetal);
  body.castShadow=true; body.receiveShadow=true; grp.add(body);
  const cap=new THREE.Mesh(new THREE.BoxGeometry(RW*1.04,0.09,RD*1.04),gunDark);
  cap.position.y=RH/2+0.045; grp.add(cap);
  const base=cap.clone(); base.position.y=-RH/2-0.045; grp.add(base);

  const faceMat=new THREE.MeshBasicMaterial({map:bakedTex});
  faceMat.toneMapped=false;
  faceMat.color.setScalar(opts && opts.bright!==undefined ? opts.bright : 0.42);
  const fw=RW*0.985;
  const face=new THREE.Mesh(new THREE.PlaneGeometry(fw,Math.min(fw*1.973,RH*0.985)),faceMat);
  face.position.set(0,0,RD/2+0.012);
  grp.add(face);
  grp.userData={kind,label,faceMat,face};

  const pl=plate(label, false);
  pl.position.set(0,RH/2+0.42,RD/2*0.4);
  grp.add(pl); grp.userData.plate=pl;

  scene.add(grp);
  if(kind==='run') focusables.push(grp);
  return grp;
}

// ---------- layout: hall of rows facing camera (Code's composition) ----------
// front row: the RUN trio centered + CW dummies at ends
const front=[];
const frontIds=RUN.slice();
frontIds.forEach((id,i)=>{
  const x=(i-2)*PITCH;
  const isRun=RUN.includes(id);
  front.push(buildRack(isRun?'run':'dummy', id, x, 0, {bright: isRun?0.55:0.42}));
});
// two rear rows of CW dummies, offset half pitch, receding
for(let r=1;r<=2;r++){
  for(let i=0;i<7;i++){
    const x=(i-3)*PITCH + (r%2?PITCH/2:0);
    buildRack('dummy','F-'+String(6+r*6+i).padStart(2,'0'), x, -r*4.4, {bright:0.30-r*0.08});
  }
}

// ---------- floor + glow ----------
const floor=new THREE.Mesh(new THREE.PlaneGeometry(140,140),
  new THREE.MeshStandardMaterial({color:0x05070b,roughness:0.3,metalness:0.85}));
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);

// grid lines (Code's neon floor feel, restrained)
const gridTex=(()=>{const c=document.createElement('canvas');c.width=c.height=128;
  const g=c.getContext('2d');g.strokeStyle='rgba(40,120,180,0.20)';g.lineWidth=2;
  g.strokeRect(0,0,128,128);const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(60,60);return t;})();
const grid=new THREE.Mesh(new THREE.PlaneGeometry(140,140),
  new THREE.MeshBasicMaterial({map:gridTex,transparent:true,opacity:0.5,depthWrite:false}));
grid.material.toneMapped=false;
grid.rotation.x=-Math.PI/2; grid.position.y=0.01; scene.add(grid);

const glowTex=(()=>{const c=document.createElement('canvas');c.width=c.height=256;
  const g=c.getContext('2d');const gr=g.createRadialGradient(128,128,10,128,128,128);
  gr.addColorStop(0,'rgba(40,220,255,0.30)');gr.addColorStop(0.5,'rgba(40,90,200,0.10)');
  gr.addColorStop(1,'rgba(0,0,0,0)');g.fillStyle=gr;g.fillRect(0,0,256,256);
  return new THREE.CanvasTexture(c);})();
const heroGlow=new THREE.Mesh(new THREE.PlaneGeometry(6.5,6.5),
  new THREE.MeshBasicMaterial({map:glowTex,transparent:true,depthWrite:false}));
heroGlow.material.toneMapped=false;
heroGlow.rotation.x=-Math.PI/2; heroGlow.position.set(0,0.02,1.1); scene.add(heroGlow);

// ---------- lighting ----------
const ambient=new THREE.AmbientLight(0x223244,0.5); scene.add(ambient);
const aisleLight=new THREE.DirectionalLight(0x3a5a8a,0.35);
aisleLight.position.set(-6,12,6); scene.add(aisleLight);
const spot=new THREE.SpotLight(0xcfe6ff,2.2,30,Math.PI/6.5,0.45,1.2);
spot.position.set(0,10.5,5.6); spot.castShadow=true;
spot.shadow.mapSize.set(1024,1024); scene.add(spot);
for(let z of [-1.6,-5.8]){
  const m=new THREE.MeshBasicMaterial({color:0x123244}); m.toneMapped=false;
  const strip=new THREE.Mesh(new THREE.BoxGeometry(7*PITCH*1.1,0.05,0.14),m);
  strip.position.set(0,7.2,z); scene.add(strip);
}

// ---------- FOCUS SYSTEM ----------
let focused=null;
const gutTextures={};   // label -> texture (built once, on image load)
const tagId=document.getElementById('tagId');
const tagSub=document.getElementById('tagSub');

function setFocus(rack, animate){
  if(focused===rack) return;
  focusables.forEach(r=>{
    const isF=(r===rack);
    r.userData.targetBright = isF ? 1.0 : 0.55;
    // plate recolor
    const pl=plate(r.userData.label, isF);
    pl.position.copy(r.userData.plate.position);
    r.remove(r.userData.plate); r.add(pl); r.userData.plate=pl;
  });
  spot.target=rack;
  heroGlow.position.x=rack.position.x;
  camTargetX=rack.position.x;           // camera drifts to the new focus
  const slots=MASTER[rack.userData.label]||[];
  const racked=slots.filter(s=>s.status==='racked').length;
  tagId.textContent=rack.userData.label+' · FOCUS';
  tagSub.textContent='LIVE MASTER · '+racked+'/'+slots.length+' RACKED · TAP FLANKS TO WALK';
  focused=rack;
}

// composite guts once the photo decodes
const heroImg=new Image();
heroImg.onload=()=>{
  focusables.forEach(r=>{
    const label=r.userData.label;
    gutTextures[label]=buildGutTexture(heroImg, MASTER[label]||[]);
    r.userData.faceMat.map=gutTextures[label];
    r.userData.faceMat.needsUpdate=true;
  });
  setFocus(focusables[2], false);   // hero starts center (c1:003)
};
heroImg.src='data:image/webp;base64,'+FACE_B64;

// ---------- dimmer ----------
const dimmer=document.getElementById('dimmer');
function applyDim(){
  const v=dimmer.value/100;
  ambient.intensity=0.85-v*0.62;
  aisleLight.intensity=0.7-v*0.55;
  scene.fog.density=0.030+v*0.030;
  scene.traverse(o=>{
    if(o.parent&&o.parent.userData&&o.parent.userData.kind==='dummy'&&o.parent.userData.face===o){
      o.material.color.setScalar(Math.max(0.12,(o.parent.position.z<-2?0.34:0.50)-v*0.22));
    }
  });
}
dimmer.addEventListener('input',applyDim); applyDim();

// ---------- camera ----------
let yaw=0.10, pitch=0.08, radius=13.5, camTargetX=0, camX=0;
const R_MIN=6.5, R_MAX=22;
function placeCamera(){
  const p=Math.max(-0.05,Math.min(0.55,pitch));
  const y=Math.max(-0.8,Math.min(0.8,yaw));
  camX+= (camTargetX-camX)*0.12;
  const T=new THREE.Vector3(camX,RH*0.5,0);
  camera.position.set(T.x+radius*Math.sin(y)*Math.cos(p),
                      T.y+radius*Math.sin(p)+0.4,
                      T.z+radius*Math.cos(y)*Math.cos(p));
  camera.lookAt(T);
}
placeCamera();

let dragging=false,lx=0,ly=0,moved=0,pinchD=0;
const hint=document.getElementById('hint');
function down(x,y){dragging=true;lx=x;ly=y;moved=0}
function move(x,y){
  if(!dragging)return;
  const dx=x-lx,dy=y-ly;lx=x;ly=y;moved+=Math.abs(dx)+Math.abs(dy);
  yaw-=dx*0.0042;pitch+=dy*0.0032;
  if(moved>10)hint.classList.add('gone');
}
function up(x,y){if(dragging&&moved<8)tap(x,y);dragging=false;}
function tdist(e){const a=e.touches[0],b=e.touches[1];
  return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)}
addEventListener('mousedown',e=>down(e.clientX,e.clientY));
addEventListener('mousemove',e=>move(e.clientX,e.clientY));
addEventListener('mouseup',e=>up(e.clientX,e.clientY));
addEventListener('touchstart',e=>{
  if(e.touches.length===2){pinchD=tdist(e);dragging=false;return;}
  const t=e.touches[0];down(t.clientX,t.clientY);},{passive:true});
addEventListener('touchmove',e=>{
  if(e.touches.length===2){const d=tdist(e);
    radius=Math.max(R_MIN,Math.min(R_MAX,radius*(pinchD/d)));pinchD=d;
    hint.classList.add('gone');return;}
  const t=e.touches[0];move(t.clientX,t.clientY);},{passive:true});
addEventListener('touchend',e=>{
  if(e.touches.length>0){pinchD=0;return;}
  const t=e.changedTouches[0];up(t.clientX,t.clientY);},{passive:true});
addEventListener('wheel',e=>{
  radius=Math.max(R_MIN,Math.min(R_MAX,radius+e.deltaY*0.012));},{passive:true});

// ---------- tap: run racks focus, dummies ignore ----------
const ray=new THREE.Raycaster();
let pulseT=-1;
function tap(x,y){
  const ndc=new THREE.Vector2((x/innerWidth)*2-1,-(y/innerHeight)*2+1);
  ray.setFromCamera(ndc,camera);
  for(const r of focusables){
    if(ray.intersectObject(r,true).length){
      if(r===focused){pulseT=0;}     // tap focused = pulse (later: opens rack)
      else setFocus(r,true);          // tap flank = focus slide
      return;
    }
  }
}
const baseSpot=spot.intensity;

// ---------- loop ----------
const clock=new THREE.Clock();
function frame(){
  requestAnimationFrame(frame);
  const dt=clock.getDelta();
  if(pulseT>=0){
    pulseT+=dt;
    spot.intensity=baseSpot+Math.max(0,Math.sin(pulseT*7))*1.4*Math.max(0,1-pulseT/0.9);
    if(pulseT>1){pulseT=-1;spot.intensity=baseSpot;}
  }
  // smooth brightness slides on the run trio
  focusables.forEach(r=>{
    const tgt=r.userData.targetBright!==undefined?r.userData.targetBright:0.55;
    const cur=r.userData.faceMat.color.r;
    if(Math.abs(cur-tgt)>0.005) r.userData.faceMat.color.setScalar(cur+(tgt-cur)*0.10);
  });
  placeCamera();
  renderer.render(scene,camera);
}
frame();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
