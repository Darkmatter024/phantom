<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- PHANTOM simplified favicon master — for tiny sizes (16/32px) the full glow + mouth muddy,
       so: bigger ghost, thicker bright rim, larger eyes, no mouth, no halos, flat dark bg.
       Reads as "ghost + eyes" at 16px. Same brand tokens. -->
  <defs>
    <linearGradient id="gs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b478ff"/>
      <stop offset="100%" stop-color="#9af6ff"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" fill="#020408"/>
  <g transform="translate(8,-4) scale(42)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"
          fill="#07101a" stroke="url(#gs)" stroke-width="1.15"/>
    <ellipse cx="9.2"  cy="10.2" rx="1.55" ry="2.25" fill="#ccfbff"/>
    <ellipse cx="14.8" cy="10.2" rx="1.55" ry="2.25" fill="#ccfbff"/>
  </g>
</svg>
