<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- PHANTOM master app icon. Authored from the in-app .ico-ghost geometry + brand tokens
       (violet #b478ff top -> cyan #9af6ff base, matching the logotype run). Filter-free:
       glows are radial gradients + layered strokes so any rasterizer renders it identically.
       Edge-to-edge (the OS applies its own corner mask). PNGs are derived from this file. -->
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="46%">
      <stop offset="0%"   stop-color="#b478ff" stop-opacity="0.30"/>
      <stop offset="48%"  stop-color="#6a3a9e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ghostStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#b478ff"/>
      <stop offset="100%" stop-color="#9af6ff"/>
    </linearGradient>
    <linearGradient id="ghostFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#13091f"/>
      <stop offset="100%" stop-color="#04141a"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#9af6ff" stop-opacity="0.85"/>
      <stop offset="40%"  stop-color="#9af6ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9af6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- edge-to-edge background -->
  <rect x="0" y="0" width="1024" height="1024" fill="#020408"/>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bgGlow)"/>

  <!-- whisper of rack glow at the very bottom edge (<=8% opacity; cut if it fails the 60px gate) -->
  <g stroke="#9af6ff" stroke-width="9" stroke-linecap="round" opacity="0.06">
    <line x1="430" y1="930" x2="430" y2="1016"/>
    <line x1="512" y1="918" x2="512" y2="1016"/>
    <line x1="594" y1="930" x2="594" y2="1016"/>
  </g>

  <!-- the ghost: exact .ico-ghost geometry, transformed into the 1024 canvas (~74% height,
       optically centered slightly above true center for the scalloped base) -->
  <g transform="translate(56,30) scale(38)" stroke-linecap="round" stroke-linejoin="round">
    <!-- rim halo (wide, faint) -->
    <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"
          fill="none" stroke="url(#ghostStroke)" stroke-width="1.55" opacity="0.32"/>
    <!-- body + bright rim -->
    <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"
          fill="url(#ghostFill)" fill-opacity="0.72" stroke="url(#ghostStroke)" stroke-width="0.78"/>
    <!-- eye glow halos -->
    <ellipse cx="9.3"  cy="10.3" rx="2.3" ry="2.9" fill="url(#eyeGlow)"/>
    <ellipse cx="14.7" cy="10.3" rx="2.3" ry="2.9" fill="url(#eyeGlow)"/>
    <!-- eyes (focal point; slightly larger than the in-app glyph for small-size legibility) -->
    <ellipse cx="9.3"  cy="10.3" rx="1.18" ry="1.85" fill="#ccfbff"/>
    <ellipse cx="14.7" cy="10.3" rx="1.18" ry="1.85" fill="#ccfbff"/>
    <!-- small mouth (kept only if it survives the 60px gate) -->
    <ellipse cx="12" cy="13.5" rx="0.64" ry="1.02" fill="#9af6ff" fill-opacity="0.85"/>
  </g>
</svg>
